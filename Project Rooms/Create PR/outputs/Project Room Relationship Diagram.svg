  <text class="note" x="82" y="980">Solid arrows show primary workflow handoffs. Dashed arrows show shared support or recurring feedback. Diagram is intentionally grouped to stay readable.</text>
  <text class="note" x="82" y="1008">Generated from Admin wiki registry/project-room relationship notes on 2026-07-19.</text>
</svg>
