<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">Buy Your Home Project Room Relationship Diagram</title>
  <desc id="desc">A grouped relationship diagram showing Jean Wright and Admin Operations as the coordination hub, with connected project room clusters for document intake, accounting and project data, real estate transactions, legal and entity work, publishing and public work, and system maintenance.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fa; }
      .title { font: 700 38px Arial, sans-serif; fill: #1f2933; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #53606c; }
      .hub { fill: #23395d; stroke: #15243b; stroke-width: 2; }
      .hubText { font: 700 24px Arial, sans-serif; fill: #ffffff; }
      .hubSub { font: 400 15px Arial, sans-serif; fill: #dbe5f3; }
      .groupTitle { font: 700 20px Arial, sans-serif; fill: #1f2933; }
      .item { font: 400 15px Arial, sans-serif; fill: #2f3a45; }
      .note { font: 400 14px Arial, sans-serif; fill: #5e6b76; }
      .box { stroke-width: 2; rx: 8; ry: 8; }
      .boxBlue { fill: #e7f0fb; stroke: #5a8fcb; }
      .boxGreen { fill: #e8f4ec; stroke: #5c9f74; }
      .boxGold { fill: #fff4db; stroke: #c99a2e; }
      .boxRed { fill: #fdebea; stroke: #c96d65; }
      .boxPurple { fill: #f0ebfa; stroke: #8b72c9; }
      .boxGray { fill: #eef1f4; stroke: #7d8994; }
      .arrow { fill: none; stroke: #687684; stroke-width: 2.3; marker-end: url(#arrowhead); }
      .arrowSoft { fill: none; stroke: #9aa5af; stroke-width: 1.8; stroke-dasharray: 6 7; marker-end: url(#arrowheadSoft); }
      .label { font: 600 13px Arial, sans-serif; fill: #4b5661; }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#687684"/>
    </marker>
    <marker id="arrowheadSoft" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa5af"/>
    </marker>
