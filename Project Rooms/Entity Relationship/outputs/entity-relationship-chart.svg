<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 18px Arial, sans-serif; fill: #4b5563; }
      .box-title { font: 700 18px Arial, sans-serif; fill: #111827; }
      .box-text { font: 15px Arial, sans-serif; fill: #1f2937; }
      .small { font: 13px Arial, sans-serif; fill: #374151; }
      .supported { fill: #dff3e3; stroke: #247a3d; stroke-width: 3; }
      .reported { fill: #fff3cd; stroke: #b58100; stroke-width: 3; stroke-dasharray: 9 7; }
      .role { fill: #e8efff; stroke: #365fbd; stroke-width: 3; stroke-dasharray: 9 7; }
      .conflict { fill: #fde2e1; stroke: #b3261e; stroke-width: 3; }
      .label { font: 14px Arial, sans-serif; fill: #374151; }
      .line { stroke: #374151; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #6b7280; stroke-width: 2.5; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrowGray); }
      .legend { font: 14px Arial, sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
